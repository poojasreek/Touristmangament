<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In | NeoMart - Modern eCommerce Experience</title>
    <meta name="description" content="Sign in to your NeoMart account or create a new one to start shopping">
    
    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        navy: {
                            50: '#f0f4ff',
                            100: '#e0eaff',
                            200: '#c7d7fe',
                            300: '#a5bbfc',
                            400: '#8195f8',
                            500: '#6366f1',
                            600: '#4f46e5',
                            700: '#4338ca',
                            800: '#3730a3',
                            900: '#312e81',
                            950: '#1e1b4b'
                        }
                    },
                    fontFamily: {
                        'heading': ['Poppins', 'sans-serif'],
                        'body': ['Roboto', 'sans-serif']
                    }
                }
            }
        }
    </script>
    
    <!-- AOS Animation Library -->
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    
    <!-- Custom CSS -->
    <link rel="stylesheet" href="styles/main.css">
    
    <style>
        /* Auth-specific styles */
        .auth-container {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
        }
        
        .auth-card {
            backdrop-filter: blur(20px);
            background: rgba(255, 255, 255, 0.95);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }
        
        .tab-indicator {
            position: absolute;
            bottom: 0;
            height: 3px;
            background: linear-gradient(90deg, #4f46e5, #7c3aed);
            border-radius: 2px;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        
        .tab-content {
            opacity: 0;
            transform: translateX(20px);
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            pointer-events: none;
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
        }
        
        .tab-content.active {
            opacity: 1;
            transform: translateX(0);
            pointer-events: all;
            position: relative;
        }
        
        .floating-label {
            position: absolute;
            top: 50%;
            left: 12px;
            transform: translateY(-50%);
            color: #6b7280;
            font-size: 16px;
            pointer-events: none;
            transition: all 0.3s ease;
            background: white;
            padding: 0 4px;
        }
        
        .form-group input:focus + .floating-label,
        .form-group input:not(:placeholder-shown) + .floating-label {
            top: 0;
            font-size: 12px;
            color: #4f46e5;
        }
        
        .password-strength {
            height: 4px;
            background: #e5e7eb;
            border-radius: 2px;
            overflow: hidden;
            margin-top: 8px;
        }
        
        .password-strength-bar {
            height: 100%;
            border-radius: 2px;
            transition: all 0.3s ease;
            width: 0%;
        }
        
        .strength-weak { background: #ef4444; width: 25%; }
        .strength-fair { background: #f59e0b; width: 50%; }
        .strength-good { background: #10b981; width: 75%; }
        .strength-strong { background: #059669; width: 100%; }
        
        .social-btn {
            position: relative;
            overflow: hidden;
        }
        
        .social-btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
            transition: left 0.5s ease;
        }
        
        .social-btn:hover::before {
            left: 100%;
        }
    </style>
</head>
<body class="font-body">
    <!-- Navigation -->
    <nav class="fixed top-0 w-full bg-white/95 backdrop-blur-md z-50 shadow-lg">
        <div class="container mx-auto px-4 py-4">
            <div class="flex items-center justify-between">
                <!-- Logo -->
                <a href="index.html" class="flex items-center space-x-2">
                    <div class="w-10 h-10 bg-navy-800 rounded-lg flex items-center justify-center">
                        <span class="text-white font-bold text-xl">N</span>
                    </div>
                    <span class="text-2xl font-heading font-bold text-navy-800">NeoMart</span>
                </a>
                
                <!-- Back to Home -->
                <a href="index.html" class="text-navy-600 hover:text-navy-800 transition-colors font-medium">
                    ← Back to Home
                </a>
            </div>
        </div>
    </nav>

    <!-- Auth Container -->
    <div class="auth-container flex items-center justify-center px-4 py-20">
        <div class="auth-card rounded-3xl shadow-2xl w-full max-w-md p-8 relative" data-aos="zoom-in">
            <!-- Header -->
            <div class="text-center mb-8">
                <h1 class="text-3xl font-heading font-bold text-navy-800 mb-2">Welcome</h1>
                <p class="text-gray-600">Sign in to your account or create a new one</p>
            </div>
            
            <!-- Tab Navigation -->
            <div class="relative mb-8">
                <div class="flex bg-gray-100 rounded-lg p-1 relative">
                    <div class="tab-indicator" id="tabIndicator"></div>
                    <button class="auth-tab flex-1 py-3 px-4 text-center font-medium rounded-md transition-all duration-300 relative z-10 active" 
                            data-tab="login" id="loginTab">
                        Sign In
                    </button>
                    <button class="auth-tab flex-1 py-3 px-4 text-center font-medium rounded-md transition-all duration-300 relative z-10" 
                            data-tab="register" id="registerTab">
                        Create Account
                    </button>
                </div>
            </div>
            
            <!-- Tab Content Container -->
            <div class="relative min-h-96">
                <!-- Login Form -->
                <div class="tab-content active" id="loginContent">
                    <form id="loginForm" class="space-y-6">
                        <div class="form-group relative">
                            <input type="email" 
                                   id="loginEmail" 
                                   placeholder=" " 
                                   class="w-full px-4 py-3 border-2 border-gray-200 rounded-lg focus:border-navy-500 focus:outline-none transition-colors"
                                   required>
                            <label for="loginEmail" class="floating-label">Email Address</label>
                        </div>
                        
                        <div class="form-group relative">
                            <input type="password" 
                                   id="loginPassword" 
                                   placeholder=" " 
                                   class="w-full px-4 py-3 pr-12 border-2 border-gray-200 rounded-lg focus:border-navy-500 focus:outline-none transition-colors"
                                   required>
                            <label for="loginPassword" class="floating-label">Password</label>
                            <button type="button" 
                                    class="absolute right-3 top-1/2 transform -translate-y-1/2 text-gray-500 hover:text-gray-700"
                                    onclick="togglePassword('loginPassword')">
                                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path>
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"></path>
                                </svg>
                            </button>
                        </div>
                        
                        <div class="flex items-center justify-between">
                            <label class="flex items-center">
                                <input type="checkbox" id="rememberMe" class="w-4 h-4 text-navy-600 border-gray-300 rounded focus:ring-navy-500">
                                <span class="ml-2 text-sm text-gray-600">Remember me</span>
                            </label>
                            <button type="button" 
                                    class="text-sm text-navy-600 hover:text-navy-800 transition-colors"
                                    onclick="showForgotPassword()">
                                Forgot password?
                            </button>
                        </div>
                        
                        <button type="submit" 
                                class="w-full bg-navy-800 text-white py-3 rounded-lg font-medium hover:bg-navy-700 transition-colors transform hover:scale-105 active:scale-95">
                            Sign In
                        </button>
                    </form>
                </div>
                
                <!-- Register Form -->
                <div class="tab-content" id="registerContent">
                    <form id="registerForm" class="space-y-6">
                        <div class="form-group relative">
                            <input type="text" 
                                   id="registerName" 
                                   placeholder=" " 
                                   class="w-full px-4 py-3 border-2 border-gray-200 rounded-lg focus:border-navy-500 focus:outline-none transition-colors"
                                   required>
                            <label for="registerName" class="floating-label">Full Name</label>
                        </div>
                        
                        <div class="form-group relative">
                            <input type="email" 
                                   id="registerEmail" 
                                   placeholder=" " 
                                   class="w-full px-4 py-3 border-2 border-gray-200 rounded-lg focus:border-navy-500 focus:outline-none transition-colors"
                                   required>
                            <label for="registerEmail" class="floating-label">Email Address</label>
                        </div>
                        
                        <div class="form-group relative">
                            <input type="password" 
                                   id="registerPassword" 
                                   placeholder=" " 
                                   class="w-full px-4 py-3 pr-12 border-2 border-gray-200 rounded-lg focus:border-navy-500 focus:outline-none transition-colors"
                                   required>
                            <label for="registerPassword" class="floating-label">Password</label>
                            <button type="button" 
                                    class="absolute right-3 top-1/2 transform -translate-y-1/2 text-gray-500 hover:text-gray-700"
                                    onclick="togglePassword('registerPassword')">
                                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path>
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"></path>
                                </svg>
                            </button>
                            <div class="password-strength">
                                <div class="password-strength-bar" id="passwordStrengthBar"></div>
                            </div>
                        </div>
                        
                        <div class="form-group relative">
                            <input type="password" 
                                   id="confirmPassword" 
                                   placeholder=" " 
                                   class="w-full px-4 py-3 pr-12 border-2 border-gray-200 rounded-lg focus:border-navy-500 focus:outline-none transition-colors"
                                   required>
                            <label for="confirmPassword" class="floating-label">Confirm Password</label>
                            <button type="button" 
                                    class="absolute right-3 top-1/2 transform -translate-y-1/2 text-gray-500 hover:text-gray-700"
                                    onclick="togglePassword('confirmPassword')">
                                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path>
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"></path>
                                </svg>
                            </button>
                        </div>
                        
                        <div class="flex items-start">
                            <input type="checkbox" id="agreeTerms" class="w-4 h-4 text-navy-600 border-gray-300 rounded focus:ring-navy-500 mt-1" required>
                            <span class="ml-2 text-sm text-gray-600">
                                I agree to the <a href="#" class="text-navy-600 hover:text-navy-800">Terms of Service</a> 
                                and <a href="#" class="text-navy-600 hover:text-navy-800">Privacy Policy</a>
                            </span>
                        </div>
                        
                        <button type="submit" 
                                class="w-full bg-navy-800 text-white py-3 rounded-lg font-medium hover:bg-navy-700 transition-colors transform hover:scale-105 active:scale-95">
                            Create Account
                        </button>
                    </form>
                </div>
            </div>
            
            <!-- Divider -->
            <div class="flex items-center my-8">
                <div class="flex-1 border-t border-gray-300"></div>
                <span class="px-4 text-gray-500 text-sm">or continue with</span>
                <div class="flex-1 border-t border-gray-300"></div>
            </div>
            
            <!-- Social Login -->
            <div class="space-y-4">
                <button type="button" 
                        class="social-btn w-full flex items-center justify-center py-3 px-4 border border-gray-300 rounded-lg hover:bg-gray-50 transition-colors"
                        onclick="signInWithGoogle()">
                    <svg class="w-5 h-5 mr-3" viewBox="0 0 24 24">
                        <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
                        <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
                        <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
                        <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
                    </svg>
                    Continue with Google
                </button>
                
                <button type="button" 
                        class="social-btn w-full flex items-center justify-center py-3 px-4 border border-gray-300 rounded-lg hover:bg-gray-50 transition-colors">
                    <svg class="w-5 h-5 mr-3 text-blue-600" fill="currentColor" viewBox="0 0 24 24">
                        <path d="M24 12.073c0-6.627-5.373-12-12-12s-12 5.373-12 12c0 5.99 4.388 10.954 10.125 11.854v-8.385H7.078v-3.47h3.047V9.43c0-3.007 1.792-4.669 4.533-4.669 1.312 0 2.686.235 2.686.235v2.953H15.83c-1.491 0-1.956.925-1.956 1.874v2.25h3.328l-.532 3.47h-2.796v8.385C19.612 23.027 24 18.062 24 12.073z"/>
                    </svg>
                    Continue with Facebook
                </button>
            </div>
        </div>
    </div>

    <!-- Forgot Password Modal -->
    <div class="modal" id="forgotPasswordModal">
        <div class="modal-content max-w-md">
            <div class="modal-header">
                <h3 class="modal-title">Reset Password</h3>
                <button class="modal-close" onclick="closeForgotPassword()">&times;</button>
            </div>
            <div class="modal-body">
                <p class="text-gray-600 mb-6">Enter your email address and we'll send you a link to reset your password.</p>
                <form id="forgotPasswordForm">
                    <div class="form-group relative mb-6">
                        <input type="email" 
                               id="resetEmail" 
                               placeholder=" " 
                               class="w-full px-4 py-3 border-2 border-gray-200 rounded-lg focus:border-navy-500 focus:outline-none transition-colors"
                               required>
                        <label for="resetEmail" class="floating-label">Email Address</label>
                    </div>
                    <div class="flex gap-4">
                        <button type="button" 
                                class="flex-1 px-4 py-2 border border-gray-300 rounded-lg hover:bg-gray-50 transition-colors"
                                onclick="closeForgotPassword()">
                            Cancel
                        </button>
                        <button type="submit" 
                                class="flex-1 bg-navy-800 text-white px-4 py-2 rounded-lg hover:bg-navy-700 transition-colors">
                            Send Reset Link
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script type="module">
        import authManager from './scripts/auth.js';
        import { DOM, Validation } from './scripts/utils.js';
        
        // Initialize AOS
        AOS.init({
            duration: 800,
            once: true
        });
        
        // Tab Management
        class AuthTabs {
            constructor() {
                this.activeTab = 'login';
                this.init();
            }
            
            init() {
                this.setupTabIndicator();
                this.bindEvents();
            }
            
            setupTabIndicator() {
                const indicator = DOM.select('#tabIndicator');
                const loginTab = DOM.select('#loginTab');
                
                // Set initial position
                indicator.style.width = '50%';
                indicator.style.left = '4px';
            }
            
            bindEvents() {
                const tabs = DOM.selectAll('.auth-tab');
                tabs.forEach(tab => {
                    tab.addEventListener('click', (e) => {
                        this.switchTab(tab.dataset.tab);
                    });
                });
            }
            
            switchTab(tabName) {
                if (this.activeTab === tabName) return;
                
                this.activeTab = tabName;
                
                // Update tab appearance
                const tabs = DOM.selectAll('.auth-tab');
                tabs.forEach(tab => {
                    if (tab.dataset.tab === tabName) {
                        DOM.addClass(tab, 'active');
                        tab.style.color = '#4f46e5';
                    } else {
                        DOM.removeClass(tab, 'active');
                        tab.style.color = '#6b7280';
                    }
                });
                
                // Move indicator
                const indicator = DOM.select('#tabIndicator');
                if (tabName === 'login') {
                    indicator.style.left = '4px';
                } else {
                    indicator.style.left = 'calc(50% + 4px)';
                }
                
                // Switch content
                const contents = DOM.selectAll('.tab-content');
                contents.forEach(content => {
                    DOM.removeClass(content, 'active');
                });
                
                setTimeout(() => {
                    DOM.addClass(DOM.select(`#${tabName}Content`), 'active');
                }, 200);
            }
        }
        
        // Password Utilities
        window.togglePassword = (inputId) => {
            const input = DOM.select(`#${inputId}`);
            const button = input.nextElementSibling;
            
            if (input.type === 'password') {
                input.type = 'text';
                button.innerHTML = `
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.543-7a9.97 9.97 0 011.563-3.029m5.858.908a3 3 0 114.243 4.243M9.878 9.878l4.242 4.242M9.878 9.878L3 3m6.878 6.878L21 21"></path>
                    </svg>
                `;
            } else {
                input.type = 'password';
                button.innerHTML = `
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path>
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"></path>
                    </svg>
                `;
            }
        };
        
        // Password Strength Indicator
        const checkPasswordStrength = (password) => {
            const strengthBar = DOM.select('#passwordStrengthBar');
            const validation = Validation.password(password);
            
            strengthBar.className = 'password-strength-bar';
            
            if (validation.strength === 'weak') {
                DOM.addClass(strengthBar, 'strength-weak');
            } else if (validation.strength === 'medium') {
                DOM.addClass(strengthBar, 'strength-fair');
            } else if (validation.strength === 'strong') {
                DOM.addClass(strengthBar, 'strength-strong');
            }
        };
        
        // Modal Management
        window.showForgotPassword = () => {
            DOM.addClass(DOM.select('#forgotPasswordModal'), 'active');
        };
        
        window.closeForgotPassword = () => {
            DOM.removeClass(DOM.select('#forgotPasswordModal'), 'active');
        };
        
        window.signInWithGoogle = async () => {
            try {
                await authManager.loginWithGoogle();
            } catch (error) {
                console.error('Google sign-in error:', error);
            }
        };
        
        // Initialize
        const authTabs = new AuthTabs();
        
        // Event Listeners
        DOM.select('#registerPassword').addEventListener('input', (e) => {
            checkPasswordStrength(e.target.value);
        });
        
        // Form Submissions
        DOM.select('#loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const email = DOM.select('#loginEmail').value;
            const password = DOM.select('#loginPassword').value;
            const rememberMe = DOM.select('#rememberMe').checked;
            
            await authManager.login(email, password, rememberMe);
        });
        
        DOM.select('#registerForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const name = DOM.select('#registerName').value;
            const email = DOM.select('#registerEmail').value;
            const password = DOM.select('#registerPassword').value;
            const confirmPassword = DOM.select('#confirmPassword').value;
            
            if (password !== confirmPassword) {
                authManager.showError('Passwords do not match');
                return;
            }
            
            await authManager.register(email, password, name);
        });
        
        DOM.select('#forgotPasswordForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const email = DOM.select('#resetEmail').value;
            const result = await authManager.resetPassword(email);
            
            if (result.success) {
                closeForgotPassword();
            }
        });
    </script>
</body>
</html>
